name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            // 'core' est injecté automatiquement par l'action, pas besoin de le require
            return await core.getIDToken()
          result-encoding: string

      - name: Build and Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_BEACH_06FAB4A0F }}
          action: upload

          # Paths
          app_location: "/"
          api_location: ""
          output_location: "dist/whizsheet-ui/browser"

          github_id_token: ${{ steps.idtoken.outputs.result }}

          skip_app_build: false
