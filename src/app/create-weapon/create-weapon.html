  <div class="whiz-container">
    <h2 class="whiz-title">Create Weapon</h2>

    <form (submit)="onSubmit($event)" class="whiz-form">

      <app-item-section
        [form]="weaponForm"
        [rarityOptions]="rangeTypeOptions"
        [itemRarityType]="ItemRarityType"
      />

      <!-- WEAPON -->
      <div class="whiz-card">
        <h4 class="whiz-section-title">Weapon Info</h4>

        <div class="whiz-grid">
          <div class="whiz-field">
            <label>Attack Type</label>
            <select [field]="$any(weaponForm.attackType)" class="whiz-input">
              @for (attackType of attackTypeOptions; track attackType) {
                <option [value]="attackType">{{ AttackType[attackType] }}</option>
              }
            </select>
          </div>

          @if (isRange()) {
            <div class="whiz-field">
              <label>Range Type</label>
              <select [field]="$any(weaponForm.rangeType)" class="whiz-input">
                @for (rangeType of rangeTypeOptions; track rangeType) {
                  <option [value]="rangeType">{{ RangeLabel[rangeType] }}</option>
                }
              </select>
            </div>
          }

          <div class="whiz-field">
            <label>Damage Type</label>
            <select [field]="$any(weaponForm.damageType)" class="whiz-input">
              @for (damageType of damageTypeOptions; track damageType) {
                <option [value]="damageType">{{ DamageType[damageType] }}</option>
              }
            </select>
          </div>

          <div class="whiz-field">
            <label>Bonus Attack Roll Type</label>
            <select [field]="$any(weaponForm.bonusAttackRollType)" class="whiz-input">
              @for (bonusAttack of bonusAttackRollTypeOptions; track bonusAttack) {
                <option [value]="bonusAttack">{{ BonusAttackRollLabel[bonusAttack] }}</option>
              }
            </select>
          </div>

          <div class="whiz-field">
            <label>Damage Dice Type</label>
            <select [field]="$any(weaponForm.damageDiceType)" class="whiz-input">
              @for (damageDice of damageDiceTypeOptions; track damageDice) {
                <option [value]="damageDice">{{ DamageDiceLabel[damageDice] }}</option>
              }
            </select>
          </div>
        </div>

        <!-- CHECKBOXES (REFONTES) -->
        <div class="whiz-checkbox-grid">
          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isLight" />
            <span>Light</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isFinesse" />
            <span>Finesse</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isThrown" />
            <span>Thrown</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isVersatile" />
            <span>Versatile</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isAmmunition" />
            <span>Ammunition</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isHeavy" />
            <span>Heavy</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isReach" />
            <span>Reach</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isTwoHanded" />
            <span>Two Handed</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isLoading" />
            <span>Loading</span>
          </label>

          <label class="whiz-checkbox-card">
            <input type="checkbox" [field]="weaponForm.isSpecial" />
            <span>Special</span>
          </label>
        </div>
      </div>

      <div class="whiz-card">
        <h4 class="whiz-section-title">Magic Weapon</h4>

        <!-- TOGGLE MAGIC -->
        <label class="whiz-checkbox-card whiz-checkbox-reverse">
          <input
            type="checkbox"
            [checked]="isMagic()"
            (change)="isMagic.set($any($event.target).checked)"
          />
          <span>Is this a magic item?</span>
        </label>

        @if (isMagic()) {
          <div class="whiz-grid">
            <label class="whiz-checkbox-card whiz-checkbox-reverse mt-3">
              <input type="checkbox" [field]="weaponForm.magicItem!.requiresAttunement" />
              <span>Requires Attunement</span>
            </label>

            <label class="whiz-checkbox-card whiz-checkbox-reverse mt-3">
              <input type="checkbox" [field]="weaponForm.isAttuned" />
              <span>Attuned</span>
            </label>

            <div class="whiz-field full">
              <label>Effect Description</label>
              <textarea
                [field]="weaponForm.magicItem!.magicEffectDescription"
                class="whiz-input"
              ></textarea>
            </div>

            <div class="whiz-field full">
              <label>Effect Mechanics</label>
              <textarea
                [field]="weaponForm.magicItem!.magicEffectMechanics"
                class="whiz-input"
              ></textarea>
            </div>

            <div class="whiz-field">
              <label>Total Charges</label>
              <input
                type="number"
                [field]="weaponForm.magicItem!.totalCharges"
                class="whiz-input"
              />
            </div>

            <div class="whiz-field">
              <label>Charges Remaining</label>
              <input
                type="number"
                [field]="weaponForm.magicItem!.chargesRemaining"
                class="whiz-input"
              />
            </div>
          </div>

          <hr />

          <!-- EFFECTS -->
          <h5 class="whiz-subtitle">Effects</h5>

          <button type="button" class="whiz-btn-add" (click)="addMagicEffect()">Add Effect</button>

          @for (effect of weaponForm.magicItem!.effects; track effect; let i = $index) {
            <div class="whiz-effect-card">
              <div class="whiz-effect-header mt-4">
                <strong>Effect #{{ i + 1 }}</strong>
              </div>

              <button type="button" class="whiz-btn-remove" (click)="removeMagicEffect(i)">
                Remove
              </button>
              <div class="whiz-grid">
                <div class="whiz-field mt-2">
                  <label>Effect Type</label>
                  <select [field]="$any(effect.effectType)" class="whiz-input">
                    @for (type of effectTypeOptions; track type) {
                      <option [value]="type">{{ ItemEffectType[type] }}</option>
                    }
                  </select>
                </div>

                <div class="whiz-field">
                  <label>Modifier Value</label>
                  <input type="number" [field]="effect.modifier" class="whiz-input" />
                </div>
              </div> 
            </div>
          }
        }
      </div>

      <div class="whiz-submit">
        <button type="submit" class="whiz-btn-primary">Submit</button>
      </div>
    </form>
  </div>
</app-character-layout>
