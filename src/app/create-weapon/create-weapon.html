<app-character-layout>
  <h3>Create Weapon</h3>
  <br />

  <form (submit)="onSubmit($event)">
    <label>Name</label><br />
    <input type="text" [field]="weaponForm.name" /><br /><br />

    <label>Description</label><br />
    <textarea [field]="weaponForm.description"></textarea><br /><br />

<label>Item rarity</label><br>
<select 
  [field]="$any(weaponForm.itemRarity)" 
  (change)="weaponModel().itemRarity = Number($any($event.target).value)">
    @for (rarity of rarityOption; track rarity) {
        <option [value]="rarity">{{ ItemRarityType[rarity] }}</option>
    }
</select><br><br>

    <button type="submit">Submit</button>
  </form>
</app-character-layout>
