<app-character-layout>
  <div class="skills-grid">
    @for (skill of characterStore.sortedSkills(); track skill.type) {
      <app-value-display-card
        [label]="formatSkillName(skill.type)"
        [value]="skill.modifier"
        (edit)="openModal(skill.type)"
      />
    } @empty {
      <p>Chargement des compétences...</p>
    }
  </div>
</app-character-layout>
