<app-character-layout>
  <div class="skills-grid">
    @for (skill of characterStore.sortedSkills(); track skill.type) {
      <app-value-display-card
        [label]="formatSkillName(skill.type)"
        [isLabelUnderline]="skill.isProficient"
        [value]="skill.modifier"
        (edit)="openModal(skill.type)"
      />
    } @empty {
      <p>Chargement des compétences...</p>
    }
  </div>
</app-character-layout>

<app-boolean-edit-modal
  [title]="selectedSkill() ? formatSkillName(selectedSkill()!.type) : 'Skill'"
  [value]="selectedSkill()?.isProficient ? 1 : 0"
  [isOpen]="isModalOpen()"
  (close)="isModalOpen.set(false)"
  (save)="onSaveSkill($event)"
/>
