<h4 class="whiz-subtitle">Ability Scores</h4>

<div class="whiz-grid">

  <div class="whiz-field">
    <label>Strength</label>
    <input type="number" class="whiz-input" [field]="form.strength" />
  </div>

  <div class="whiz-field">
    <label>Dexterity</label>
    <input type="number" class="whiz-input" [field]="form.dexterity" />
  </div>

  <div class="whiz-field">
    <label>Constitution</label>
    <input type="number" class="whiz-input" [field]="form.constitution" />
  </div>

  <div class="whiz-field">
    <label>Intelligence</label>
    <input type="number" class="whiz-input" [field]="form.intelligence" />
  </div>

  <div class="whiz-field">
    <label>Wisdom</label>
    <input type="number" class="whiz-input" [field]="form.wisdom" />
  </div>

  <div class="whiz-field">
    <label>Charisma</label>
    <input type="number" class="whiz-input" [field]="form.charisma" />
  </div>

</div>
