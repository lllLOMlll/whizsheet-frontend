<div class="whiz-card">

  <div class="whiz-grid">

    <div class="whiz-field full">
      <label>Class</label>
      <select
        class="whiz-input"
        [value]="model().classType"
        (change)="update({ classType: $any($event.target).value })"
      >
        <option value="">-- Choose a class --</option>
        @for (c of classes; track c) {
          <option [value]="c" [selected]="c === model().classType">
            {{ c }}
          </option>
        }
      </select>
    </div>

    @if (model().classType === CharacterClassType.Other) {
      <div class="whiz-field full">
        <label>Custom class</label>
        <input
          type="text"
          class="whiz-input"
          [value]="model().customClassName"
          (input)="update({ customClassName: $any($event.target).value })"
        />
      </div>
    }

    <div class="whiz-field">
      <label>Level</label>
      <input
        type="number"
        class="whiz-input"
        [value]="model().level"
        (input)="update({ level: +$any($event.target).value })"
      />
    </div>

  </div>

  <button
    type="button"
    class="whiz-btn-remove"
    (click)="remove()"
  >
    Remove
  </button>

</div>
