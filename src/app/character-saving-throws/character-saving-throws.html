<app-character-layout>
  <h3 class="text-center section-title-whiz">Saving Throws</h3>
  
  <div class="card-grid">
    <app-value-display-card
      label="Strength"
      [isLabelUnderline]="getST(SavingThrowsType.strength)?.isProficient ?? false"
      [value]="getST(SavingThrowsType.strength)?.modifier ?? 0"
      (edit)="openModalByEnum(SavingThrowsType.strength)"
    />

    <app-value-display-card
      label="Dexterity"
      [isLabelUnderline]="getST(SavingThrowsType.dexterity)?.isProficient ?? false"
      [value]="getST(SavingThrowsType.dexterity)?.modifier ?? 0"
      (edit)="openModalByEnum(SavingThrowsType.dexterity)"
    />

    <app-value-display-card
      label="Constitution"
      [isLabelUnderline]="getST(SavingThrowsType.constitution)?.isProficient ?? false"
      [value]="getST(SavingThrowsType.constitution)?.modifier ?? 0"
      (edit)="openModalByEnum(SavingThrowsType.constitution)"
    />

    <app-value-display-card
      label="Intelligence"
      [isLabelUnderline]="getST(SavingThrowsType.intelligence)?.isProficient ?? false"
      [value]="getST(SavingThrowsType.intelligence)?.modifier ?? 0"
      (edit)="openModalByEnum(SavingThrowsType.intelligence)"
    />

    <app-value-display-card
      label="Wisdom"
      [isLabelUnderline]="getST(SavingThrowsType.wisdom)?.isProficient ?? false"
      [value]="getST(SavingThrowsType.wisdom)?.modifier ?? 0"
      (edit)="openModalByEnum(SavingThrowsType.wisdom)"
    />

    <app-value-display-card
      label="Charisma"
      [isLabelUnderline]="getST(SavingThrowsType.charisma)?.isProficient ?? false"
      [value]="getST(SavingThrowsType.charisma)?.modifier ?? 0"
      (edit)="openModalByEnum(SavingThrowsType.charisma)"
    />
  </div>
</app-character-layout>

<app-boolean-edit-modal
  [title]="label()"
  [value]="isSelectedSavingThrowProficient()"
  [isOpen]="isModalOpen()"
  (close)="isModalOpen.set(false)"
  (save)="onSave($event)"
/>
